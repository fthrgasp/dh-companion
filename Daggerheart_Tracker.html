body{margin:0;background:#f2efe9;color:#26221b;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
a{color:#8C5A2B}a:hover{color:#6e4520}
input,select,textarea,button{font-family:inherit;color:var(--text,#26221b)}
::placeholder{color:#b3ab9d}
@page{size:letter;margin:0.5in}
@media print{
  [data-print-hide]{display:none !important}
  body,*{-webkit-print-color-adjust:exact;print-color-adjust:exact;color-adjust:exact}
  body{background:#fff !important}
}

#app-root{min-height:100vh}
</style>
</head>
<body>
<template id="app-template">

<div style="min-height:100vh;background:{{wrapperBg}};color:var(--text);--accent:{{accent}};--prad:{{pipRad}};--prot:{{pipRot}};--bg:{{bg}};--panel:{{panelBg}};--border:{{borderC}};--border2:{{border2C}};--text:{{textC}};--muted:{{mutedC}};--input-bg:{{inputBg}};--border3:{{border3C}};--track-bg:{{trackBg}};--companion-bg:{{companionBgC}};--companion-border:{{companionBorderC}};--major-bg:{{majorBgC}};--severe-bg:{{severeBgC}};--highlight-bg:{{highlightBgC}}">

<sc-if value="{{updateAvailable}}" hint-placeholder-val="{{ false }}">
  <div data-print-hide="1" style="position:sticky;top:0;z-index:100;background:var(--accent,#8C5A2B);color:#fff;padding:9px 16px;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;font-size:13px">
    <span>A newer version ({{updateVersion}}) is available. Your saved characters are safe either way.</span>
    <button sc-camel-on-click="{{reloadForUpdate}}" style="border:1px solid rgba(255,255,255,0.6);background:rgba(255,255,255,0.15);color:#fff;border-radius:8px;padding:5px 14px;font-size:12.5px;cursor:pointer">Reload now</button>
    <button sc-camel-on-click="{{dismissUpdate}}" style="border:none;background:none;color:#fff;opacity:0.8;cursor:pointer;font-size:12.5px;text-decoration:underline">Not now</button>
  </div>
</sc-if>

<!-- ============ SIGN IN ============ -->
<sc-if value="{{showAuthGate}}" hint-placeholder-val="{{ false }}">
<div data-screen-label="Sign In" style="max-width:400px;margin:0 auto;padding:80px 32px">
  <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:32px;box-shadow:0 1px 3px rgba(38,34,27,0.06)">
    <h1 style="font-family:'Spectral',serif;font-weight:600;font-size:24px;margin:0 0 6px">Sign in</h1>
    <p style="font-size:13px;color:var(--muted);margin:0 0 20px">Sign in to sync your characters across devices. We'll email you a magic link — no password needed.</p>
    <sc-if value="{{authMagicLinkSent}}" hint-placeholder-val="{{ false }}">
      <p style="font-size:13.5px;color:var(--text)">Check your email for a sign-in link.</p>
    </sc-if>
    <sc-if value="{{authFormOpen}}" hint-placeholder-val="{{ true }}">
      <input type="email" value="{{authEmail}}" sc-camel-on-change="{{setAuthEmail}}" placeholder="you@example.com" style="width:100%;box-sizing:border-box;border:1px solid var(--border2);border-radius:8px;padding:10px 12px;font-size:14px;background:var(--input-bg);margin-bottom:10px">
      <sc-if value="{{authErrorOpen}}" hint-placeholder-val="{{ false }}">
        <p style="font-size:12.5px;color:#A33B3B;margin:0 0 10px">{{authErrorText}}</p>
      </sc-if>
      <button sc-camel-on-click="{{sendMagicLink}}" style="width:100%;border:none;background:var(--accent,#8C5A2B);color:#fff;border-radius:8px;padding:10px;font-size:14px;font-weight:600;cursor:pointer">Send magic link</button>
    </sc-if>
    <div style="height:1px;background:var(--border3);margin:20px 0"></div>
    <button sc-camel-on-click="{{skipAuthClick}}" style="width:100%;border:1px solid var(--border2);background:var(--panel);color:var(--text);border-radius:8px;padding:9px;font-size:13px;cursor:pointer">Continue without an account (this device only)</button>
  </div>
</div>
</sc-if>

<!-- ============ LOCAL CHARACTER IMPORT PROMPT ============ -->
<sc-if value="{{localImportOpen}}" hint-placeholder-val="{{ false }}">
  <div style="position:fixed;inset:0;z-index:200;background:rgba(38,34,27,0.45);display:flex;align-items:center;justify-content:center;padding:24px">
    <div style="max-width:420px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:26px;box-shadow:0 8px 24px rgba(38,34,27,0.25)">
      <h2 style="font-family:'Spectral',serif;font-weight:600;font-size:19px;margin:0 0 10px">Import local characters?</h2>
      <p style="font-size:13.5px;color:var(--muted);margin:0 0 20px">This browser has {{localImportCount}} character(s) saved locally that aren't in your account yet. Import them now, or start fresh with an empty roster.</p>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button sc-camel-on-click="{{dismissLocalImport}}" style="border:1px solid var(--border2);background:var(--panel);color:var(--text);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer">Start fresh</button>

  <div data-screen-label="Play" style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">

    <!-- Column A: stats -->
    <div style="flex:1;min-width:290px;display:flex;flex-direction:column;gap:16px">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Conditions</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px" data-print-hide="1">
          <sc-for list="{{conditionList}}" as="cd2" hint-placeholder-count="3">
            <div style="display:inline-flex;align-items:center;gap:6px;border:1px solid {{cd2.bc}};background:{{cd2.bg}};color:{{cd2.fg}};border-radius:999px;padding:6px 6px 6px 14px;font-size:12.5px;cursor:pointer" title="{{cd2.desc}}">
              <span sc-camel-on-click="{{cd2.toggle}}">{{cd2.name}}</span>
              <sc-if value="{{cd2.removable}}" hint-placeholder-val="{{ false }}">
                <button sc-camel-on-click="{{cd2.remove}}" style="border:none;background:none;color:inherit;opacity:0.6;cursor:pointer;font-size:12px;padding:0 2px">✕</button>
              </sc-if>
            </div>
          </sc-for>
        </div>
        <div style="display:flex;gap:6px" data-print-hide="1">
          <input value="{{newConditionName}}" sc-camel-on-change="{{setNewConditionName}}" placeholder="Custom condition" style="flex:1;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--input-bg)">
          <button sc-camel-on-click="{{addCondition}}" style="border:1px solid var(--border2);background:var(--panel);color:var(--text);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer" style-hover="border-color:var(--text)">Add</button>
        </div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="display:flex;gap:10px">
          <div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:10px;padding:10px 6px"><div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Evasion</div><div style="font-family:'Spectral',serif;font-size:26px;font-weight:600">{{c.evasion}}</div></div>
          <div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:10px;padding:10px 6px"><div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Armor</div><div style="font-family:'Spectral',serif;font-size:26px;font-weight:600">{{c.armorScore}}</div></div>
          <div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:10px;padding:10px 6px"><div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Prof.</div><div style="font-family:'Spectral',serif;font-size:26px;font-weight:600">{{c.proficiency}}</div></div>
        </div>
        <div style="margin-top:14px">
          <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Damage thresholds</div>
          <div style="display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;text-align:center;font-size:12px">
            <div style="flex:1;padding:8px 4px;background:var(--input-bg)"><div style="color:var(--muted)">Minor</div><div style="font-weight:600">1+ · mark 1</div></div>
            <div style="flex:1;padding:8px 4px;border-left:1px solid var(--border);background:var(--major-bg)"><div style="color:var(--muted)">Major</div><div style="font-weight:600">{{c.thresholds.major}}+ · mark 2</div></div>
            <div style="flex:1;padding:8px 4px;border-left:1px solid var(--border);background:var(--severe-bg)"><div style="color:var(--muted)">Severe</div><div style="font-weight:600">{{c.thresholds.severe}}+ · mark 3</div></div>
          </div>
        </div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Traits</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <sc-for list="{{traitList}}" as="tr" hint-placeholder-count="6">
            <div style="border:1px solid var(--border);border-radius:10px;padding:8px 4px;text-align:center"><div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted)">{{tr.name}}</div><div style="font-family:'Spectral',serif;font-size:22px;font-weight:600">{{tr.val}}</div></div>
          </sc-for>
        </div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Experiences</div>
        <sc-for list="{{expListView}}" as="ex" hint-placeholder-count="2">
          <div style="display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:5px 0;border-bottom:1px solid var(--border3)"><span>{{ex.name}}</span><span style="font-weight:600;color:var(--accent,#8C5A2B)">{{ex.bonus}}</span></div>
        </sc-for>
      </div>
    </div>

    <!-- Column B: resources + damage -->
    <div style="flex:1.25;min-width:330px;display:flex;flex-direction:column;gap:16px">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:14px">
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#A33B3B;margin-bottom:7px"><span style="font-weight:600">Hit Points</span><span>{{hpTxt}}</span></div>
          <div style="display:flex;gap:7px;flex-wrap:wrap"><sc-for list="{{hpPips}}" as="p" hint-placeholder-count="6"><div sc-camel-on-click="{{p.click}}" style="width:26px;height:26px;cursor:pointer;border:2px solid #A33B3B;background:{{p.bg}};border-radius:var(--prad,999px);transform:var(--prot,none)"></div></sc-for></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#5B4A8A;margin-bottom:7px"><span style="font-weight:600">Stress</span><span>{{stTxt}}</span></div>
          <div style="display:flex;gap:7px;flex-wrap:wrap"><sc-for list="{{stPips}}" as="p" hint-placeholder-count="6"><div sc-camel-on-click="{{p.click}}" style="width:26px;height:26px;cursor:pointer;border:2px solid #5B4A8A;background:{{p.bg}};border-radius:var(--prad,999px);transform:var(--prot,none)"></div></sc-for></div>
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#5A6470;margin-bottom:7px"><span style="font-weight:600">Armor slots</span><span>{{arTxt}}</span></div>
          <div style="display:flex;gap:7px;flex-wrap:wrap"><sc-for list="{{arPips}}" as="p" hint-placeholder-count="3"><div sc-camel-on-click="{{p.click}}" style="width:26px;height:26px;cursor:pointer;border:2px solid #5A6470;background:{{p.bg}};border-radius:var(--prad,999px);transform:var(--prot,none)"></div></sc-for></div>
        </div>
        <div style="border-top:1px solid var(--border3);padding-top:14px">
          <div style="display:flex;justify-content:space-between;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#a5821f;margin-bottom:7px"><span style="font-weight:600">Hope</span><span>{{hopeTxt}}</span></div>
          <div style="display:flex;gap:9px;flex-wrap:wrap"><sc-for list="{{hopePips}}" as="p" hint-placeholder-count="6"><div sc-camel-on-click="{{p.click}}" style="width:24px;height:24px;cursor:pointer;border:2px solid #C9A227;background:{{p.bg}};border-radius:3px;transform:rotate(45deg);margin:3px"></div></sc-for></div>
        </div>
      </div>

      <!-- Damage calculator -->
      <div data-screen-label="Damage calculator" data-print-hide="1" style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Take damage</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="number" value="{{dmgInput}}" sc-camel-on-change="{{setDmgInput}}" placeholder="Incoming damage" style="width:150px;border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-size:15px;background:var(--input-bg)">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" checked="{{useArmor}}" sc-camel-on-change="{{toggleArmor}}">Mark an armor slot (−1 severity)</label>
        </div>
        <div style="margin-top:12px">
          <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Modifiers</div>
          <div style="display:flex;flex-direction:column;gap:6px">
            <sc-for list="{{modList}}" as="m" hint-placeholder-count="2">
              <div style="display:flex;align-items:center;gap:8px;font-size:13px">
                <button sc-camel-on-click="{{m.toggle}}" style="flex:1;text-align:left;display:flex;justify-content:space-between;gap:8px;border:1px solid {{m.bc}};background:{{m.bg}};color:{{m.fg}};border-radius:8px;padding:7px 12px;cursor:pointer"><span>{{m.label}}</span><span style="font-weight:600">{{m.eff}}</span></button>
                <button sc-camel-on-click="{{m.remove}}" style="border:none;background:none;color:#b3ab9d;cursor:pointer;font-size:15px;padding:4px" style-hover="color:#A33B3B">✕</button>
              </div>
            </sc-for>
          </div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <input value="{{newModLabel}}" sc-camel-on-change="{{setNewModLabel}}" placeholder="e.g. Physical resistance" style="flex:2;min-width:140px;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--input-bg)">
            <sc-raw-select value="{{newModType}}" sc-camel-on-change="{{setNewModType}}" style="border:1px solid var(--border2);border-radius:8px;padding:7px 8px;font-size:13px;background:var(--input-bg)">
              <option value="half">Halve damage</option>
              <option value="minus">Reduce by N</option>
              <option value="plus">Increase by N</option>
            </sc-raw-select>
            <input type="number" value="{{newModValue}}" sc-camel-on-change="{{setNewModValue}}" style="width:56px;border:1px solid var(--border2);border-radius:8px;padding:7px 8px;font-size:13px;background:var(--input-bg)">
            <button sc-camel-on-click="{{addMod}}" style="border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer" style-hover="border-color:var(--text)">Add</button>
          </div>
        </div>
        <div style="margin-top:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-top:1px solid var(--border3);padding-top:12px">
          <div style="flex:1;min-width:180px;font-size:14px">{{dmgResult}}</div>
          <button sc-camel-on-click="{{applyDamage}}" style="border:none;background:#A33B3B;color:#fff;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer" style-hover="background:#8c3030">Apply</button>
        </div>
      </div>

      <button sc-camel-on-click="{{longRest}}" data-print-hide="1" style="border:1px solid var(--border2);background:var(--panel);border-radius:10px;padding:13px;font-size:14px;cursor:pointer;color:var(--text)" style-hover="border-color:var(--accent,#8C5A2B);color:var(--accent,#8C5A2B)">☽ Long rest — clear HP &amp; Stress, restore armor slots &amp; once-per-rest items</button>
    </div>

    <!-- Column C: trackers + items -->
    <div style="flex:1;min-width:280px;display:flex;flex-direction:column;gap:16px">
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Weapons &amp; Armor</div>
        <sc-if value="{{hasEquippedWeapons}}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:8px">
            <sc-for list="{{playEquippedWeapons}}" as="ew" hint-placeholder-count="1">
              <div style="border:1px solid var(--border3);border-radius:8px;padding:8px 10px">
                <div style="display:flex;justify-content:space-between;gap:8px;font-size:13.5px;font-weight:600"><span>{{ew.name}}</span><span style="color:var(--muted);font-weight:400">{{ew.range}}</span></div>
                <div style="font-size:12.5px;color:var(--muted);margin-top:2px">{{ew.damage}}</div>
                <sc-if value="{{ew.hasFeatures}}" hint-placeholder-val="{{ false }}">
                  <div style="font-size:11.5px;color:var(--muted);margin-top:4px;font-style:italic">{{ew.featuresTxt}}</div>
                </sc-if>
              </div>
            </sc-for>
          </div>
        </sc-if>
        <sc-if value="{{noEquippedWeapons}}" hint-placeholder-val="{{ true }}">
          <div style="font-size:13px;color:var(--muted);margin-bottom:8px">No weapon equipped.</div>
        </sc-if>
        <div style="font-size:12.5px;color:var(--muted)">{{playArmorSummary}}</div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:8px;font-style:italic" data-print-hide="1">Edit these on the Gear tab.</div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Trackers</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <sc-for list="{{trackerList}}" as="tk" hint-placeholder-count="1">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="flex:1;font-size:14px">{{tk.label}}</span>
              <button sc-camel-on-click="{{tk.dec}}" style="width:28px;height:28px;border:1px solid var(--border2);background:var(--panel);border-radius:7px;cursor:pointer;font-size:15px">−</button>
              <span style="width:26px;text-align:center;font-family:'Spectral',serif;font-size:19px;font-weight:600">{{tk.value}}</span>
              <button sc-camel-on-click="{{tk.inc}}" style="width:28px;height:28px;border:1px solid var(--border2);background:var(--panel);border-radius:7px;cursor:pointer;font-size:15px">+</button>
              <button sc-camel-on-click="{{tk.remove}}" style="border:none;background:none;color:#b3ab9d;cursor:pointer;font-size:14px;padding:2px" style-hover="color:#A33B3B">✕</button>
            </div>
          </sc-for>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px" data-print-hide="1">
          <input value="{{newTracker}}" sc-camel-on-change="{{setNewTracker}}" placeholder="e.g. Inspiration" style="flex:1;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--input-bg)">
          <button sc-camel-on-click="{{addTracker}}" style="border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer" style-hover="border-color:var(--text)">Add</button>
        </div>
      </div>
      <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px">
        <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Once per long rest</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <sc-for list="{{restItemList}}" as="ri" hint-placeholder-count="2">
            <div style="display:flex;gap:10px;align-items:flex-start">
              <button sc-camel-on-click="{{ri.toggle}}" style="flex:none;width:22px;height:22px;margin-top:1px;border:2px solid var(--accent,#8C5A2B);background:{{ri.bg}};border-radius:6px;cursor:pointer;color:#fff;font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0">{{ri.check}}</button>
              <div style="flex:1">
                <div style="font-size:14px;font-weight:600;text-decoration:{{ri.deco}};color:{{ri.fg}}">{{ri.name}}</div>
                <div style="font-size:12.5px;color:var(--muted);margin-top:1px">{{ri.desc}}</div>
              </div>
              <button sc-camel-on-click="{{ri.remove}}" style="border:none;background:none;color:#b3ab9d;cursor:pointer;font-size:14px;padding:2px" style-hover="color:#A33B3B">✕</button>
            </div>
          </sc-for>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:12px" data-print-hide="1">
          <input value="{{newItemName}}" sc-camel-on-change="{{setNewItemName}}" placeholder="Item name" style="border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--input-bg)">
          <div style="display:flex;gap:6px">
            <input value="{{newItemDesc}}" sc-camel-on-change="{{setNewItemDesc}}" placeholder="What it does" style="flex:1;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--input-bg)">
            <button sc-camel-on-click="{{addRestItem}}" style="border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer" style-hover="border-color:var(--text)">Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  </sc-if>

  <!-- ======== CARDS TAB ======== -->
  <sc-if value="{{tabCards}}" hint-placeholder-val="{{ false }}">
  <div data-screen-label="Domain cards" style="display:flex;flex-direction:column;gap:22px;max-width:820px">
    <div>
      <div style="font-family:'Spectral',serif;font-size:19px;font-weight:600;margin-bottom:10px">Loadout <span style="font-size:12px;color:var(--muted);font-family:system-ui,sans-serif;font-weight:400">— active cards</span></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{loadoutCards}}" as="cd" hint-placeholder-count="3">
          <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px;display:flex;gap:14px;align-items:flex-start">
            <div style="flex:none;width:10px;align-self:stretch;border-radius:5px;background:{{cd.chip}}"></div>
            <div style="flex:1">
              <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap"><span style="font-family:'Spectral',serif;font-size:17px;font-weight:600">{{cd.name}}</span><span style="font-size:11.5px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase">{{cd.meta}}</span></div>
              <div style="font-size:13.5px;color:#4d463a;margin-top:4px;line-height:1.45">{{cd.text}}</div>
            </div>
            <button sc-camel-on-click="{{cd.move}}" style="flex:none;border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--muted)" style-hover="border-color:var(--text);color:var(--text)">To vault</button>
          </div>
        </sc-for>
      </div>
    </div>
    <div>
      <div style="font-family:'Spectral',serif;font-size:19px;font-weight:600;margin-bottom:10px">Vault <span style="font-size:12px;color:var(--muted);font-family:system-ui,sans-serif;font-weight:400">— stored cards</span></div>
      <div style="display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{vaultCards}}" as="cd" hint-placeholder-count="1">
          <div style="background:var(--input-bg);border:1px dashed var(--border2);border-radius:12px;padding:14px 18px;display:flex;gap:14px;align-items:flex-start;opacity:0.85">
            <div style="flex:none;width:10px;align-self:stretch;border-radius:5px;background:{{cd.chip}}"></div>
            <div style="flex:1">
              <div style="display:flex;gap:10px;align-items:baseline;flex-wrap:wrap"><span style="font-family:'Spectral',serif;font-size:16px;font-weight:600">{{cd.name}}</span><span style="font-size:11.5px;color:var(--muted);letter-spacing:0.05em;text-transform:uppercase">{{cd.meta}}</span></div>
              <div style="font-size:13px;color:#4d463a;margin-top:4px;line-height:1.45">{{cd.text}}</div>
            </div>
            <button sc-camel-on-click="{{cd.move}}" style="flex:none;border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer" style-hover="border-color:var(--text)">Equip</button>
          </div>
        </sc-for>
      </div>
    </div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px" data-print-hide="1">
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Add a card</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <input value="{{newCardName}}" sc-camel-on-change="{{setNewCardName}}" placeholder="Card name" style="flex:1;min-width:140px;border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--input-bg)">
        <sc-raw-select value="{{newCardDomain}}" sc-camel-on-change="{{setNewCardDomain}}" style="border:1px solid var(--border2);border-radius:8px;padding:8px;font-size:13px;background:var(--input-bg)">
          <sc-for list="{{domainOptions}}" as="dopt" hint-placeholder-count="9">
            <option value="{{dopt}}">{{dopt}}</option>
          </sc-for>
        </sc-raw-select>
        <input value="{{newCardText}}" sc-camel-on-change="{{setNewCardText}}" placeholder="Effect text" style="flex:2;min-width:180px;border:1px solid var(--border2);border-radius:8px;padding:8px 10px;font-size:13px;background:var(--input-bg)">
        <button sc-camel-on-click="{{addCard}}" style="border:1px solid var(--border2);background:var(--panel);border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer" style-hover="border-color:var(--text)">Add</button>
      </div>
    </div>
    <div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px">
      <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Custom domain decks</div>

            <button sc-camel-on-click="{{wizConfirm}}" style="border:none;background:var(--accent,#8C5A2B);color:#fff;border-radius:8px;padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer">Confirm Level Up</button>

      </div>
    </div>

<script>
/* Minimal runtime that replicates the small template DSL used by this app:
   sc-if / sc-for / {{expr}} interpolation / sc-camel-on-click / sc-camel-on-change /
   sc-camel-auto-focus / sc-raw-select / x-import (image-slot) / style-hover.
   No external framework dependency — plain DOM. */

(function (global) {
  'use strict';

  var EXPR_RE = /\{\{\s*([^}]+?)\s*\}\}/g;
  var FULL_EXPR_RE = /^\{\{\s*([^}]+?)\s*\}\}$/;

  function resolveExpr(scope, exprRaw) {
    var e = (exprRaw || '').trim();
    if (e === 'true') return true;
    if (e === 'false') return false;
    if (e === '') return undefined;
    var parts = e.split('.');
    var cur = scope;
    for (var i = 0; i < parts.length; i++) {
      if (cur === null || cur === undefined) return undefined;
      cur = cur[parts[i]];
    }
    return cur;
  }

  function interpolateString(scope, str) {
    if (str == null) return '';
    return String(str).replace(EXPR_RE, function (m, expr) {
      var v = resolveExpr(scope, expr);
      return (v === undefined || v === null) ? '' : String(v);
    });
  }

  // Resolve an attribute's raw text: if it is *exactly* one {{expr}}, return
  // the typed value (function/bool/number/etc). Otherwise treat it as a
  // string template and interpolate.
  function resolveAttrRaw(scope, raw) {
    var full = FULL_EXPR_RE.exec(raw || '');
    if (full) return resolveExpr(scope, full[1]);
    return interpolateString(scope, raw);
  }

  var SKIP_ATTRS = {
    'hint-placeholder-val': 1,
    'hint-placeholder-count': 1,
    'hint-size': 1,
    'component-from-global-scope': 1,
    'from': 1,
    'as': 1,
    'list': 1,
    'value': 1,
    'checked': 1,
    'disabled': 1,
    'style-hover': 1,
    'sc-camel-on-click': 1,
    'sc-camel-on-change': 1,
    'sc-camel-auto-focus': 1
  };

  function applyHover(el, hoverRaw, scope) {
    var hoverCss = interpolateString(scope, hoverRaw);
    if (!hoverCss) return;
    var base = el.getAttribute('style') || '';
    el.addEventListener('mouseenter', function () {
      el.setAttribute('style', base + ';' + hoverCss);
    });
    el.addEventListener('mouseleave', function () {
      el.setAttribute('style', base);
    });
  }

  function buildImageSlot(engine, scope, node) {
    var idRaw = node.getAttribute('id') || '';
    var key = interpolateString(scope, idRaw);
    var shape = node.getAttribute('shape') || 'rect';
    var placeholder = interpolateString(scope, node.getAttribute('placeholder') || '');
    var styleStr = interpolateString(scope, node.getAttribute('style') || '');

    var wrap = document.createElement('div');
    wrap.setAttribute('style', styleStr +
      ';position:relative;cursor:pointer;overflow:hidden;background:var(--input-bg,#eee);' +
      'display:flex;align-items:center;justify-content:center;flex:none;' +
      (shape === 'circle' ? 'border-radius:50%;' : 'border-radius:8px;'));

    var storageKey = 'dh-tracker-img-' + key;
    var dataUrl = null;
    try { dataUrl = localStorage.getItem(storageKey); } catch (e) {}

    function paint() {
      wrap.innerHTML = '';
      var du = null;
      try { du = localStorage.getItem(storageKey); } catch (e) {}
      if (du) {
        var img = document.createElement('img');
        img.src = du;
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
        wrap.appendChild(img);
        var rm = document.createElement('button');
        rm.type = 'button';
        rm.textContent = '\u2715';
        rm.title = 'Remove image';
        rm.style.cssText = 'position:absolute;top:2px;right:2px;width:18px;height:18px;line-height:16px;' +
          'padding:0;border:none;border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:10px;cursor:pointer;';
        rm.onclick = function (e) {
          e.stopPropagation();
          try { localStorage.removeItem(storageKey); } catch (er) {}
          paint();
        };
        wrap.appendChild(rm);
      } else {
        var ph = document.createElement('span');
        ph.textContent = placeholder || '+ Add';
        ph.style.cssText = 'font-size:11px;color:var(--muted,#999);text-align:center;padding:4px;pointer-events:none;';
        wrap.appendChild(ph);
      }
    }
    paint();

    var fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = 'image/*';
    fileInput.style.display = 'none';
    fileInput.onchange = function (e) {
      var f = e.target.files && e.target.files[0];
      if (!f) return;
      var reader = new FileReader();
      reader.onload = function () {
        try {
          localStorage.setItem(storageKey, reader.result);
        } catch (err) {
          alert('That image is too large to store in the browser. Try a smaller photo.');
          return;
        }
        paint();
      };
      reader.readAsDataURL(f);
    };
    wrap.appendChild(fileInput);
    wrap.addEventListener('click', function () { fileInput.click(); });
    return wrap;
  }

  function renderNode(engine, node, scope, out, loopPath) {
    if (node.nodeType === 3) { // text
      var txt = interpolateString(scope, node.nodeValue);
      out.push(document.createTextNode(txt));
      return;
    }
    if (node.nodeType !== 1) return; // ignore comments etc.

    var tag = node.tagName.toLowerCase();

    if (tag === 'sc-if') {
      var val = resolveAttrRaw(scope, node.getAttribute('value') || '');
      if (val) renderChildren(engine, node, scope, out, loopPath);
      return;
    }

    if (tag === 'sc-for') {
      var listExprRaw = node.getAttribute('list') || '';
      var list = resolveAttrRaw(scope, listExprRaw) || [];
      var alias = node.getAttribute('as');
      var listKey = (FULL_EXPR_RE.exec(listExprRaw) || [null, listExprRaw])[1];
      for (var i = 0; i < list.length; i++) {
        var childScope = Object.create(scope);
        childScope[alias] = list[i];
        var childLoopPath = loopPath + '/' + listKey + ':' + i;
        renderChildren(engine, node, childScope, out, childLoopPath);
      }
      return;
    }

    if (tag === 'x-import') {
      out.push(buildImageSlot(engine, scope, node));
      return;
    }

    var realTag = tag === 'sc-raw-select' ? 'select' : tag;
    var el = document.createElement(realTag);

    var attrs = node.attributes;
    var valueRaw = null, checkedRaw = null, disabledRaw = null;
    var onClickRaw = null, onChangeRaw = null, autoFocusRaw = null, hoverRaw = null;
    var bindPathForFocus = null;

    for (var a = 0; a < attrs.length; a++) {
      var name = attrs[a].name;
      var raw = attrs[a].value;
      if (name === 'value') { valueRaw = raw; continue; }
      if (name === 'checked') { checkedRaw = raw; continue; }
      if (name === 'disabled') { disabledRaw = raw; continue; }
      if (name === 'sc-camel-on-click') { onClickRaw = raw; continue; }
      if (name === 'sc-camel-on-change') { onChangeRaw = raw; continue; }
      if (name === 'sc-camel-auto-focus') { autoFocusRaw = raw; continue; }
      if (name === 'style-hover') { hoverRaw = raw; continue; }
      if (SKIP_ATTRS[name]) continue;
      el.setAttribute(name, interpolateString(scope, raw));
    }

    // Populate children first (options etc.) — a <select>'s .value only
    // "sticks" once matching <option> elements already exist in the DOM.
    renderChildren(engine, node, scope, [], loopPath, el);

    if (valueRaw !== null) {
      var v = resolveAttrRaw(scope, valueRaw);
      el.value = (v === undefined || v === null) ? '' : v;
      var m = FULL_EXPR_RE.exec(valueRaw);
      if (m) {
        bindPathForFocus = loopPath + '|' + m[1];
        el.setAttribute('data-dc-bind', bindPathForFocus);
      }
    }
    if (checkedRaw !== null) el.checked = !!resolveAttrRaw(scope, checkedRaw);
    if (disabledRaw !== null) el.disabled = !!resolveAttrRaw(scope, disabledRaw);
    if (onClickRaw !== null) {
      var clickFn = resolveAttrRaw(scope, onClickRaw);
      if (typeof clickFn === 'function') el.onclick = function (fn) { return function (e) { fn(e); }; }(clickFn);
    }
    if (onChangeRaw !== null) {
      var changeFn = resolveAttrRaw(scope, onChangeRaw);
      if (typeof changeFn === 'function') el.onchange = function (fn) { return function (e) { fn(e); }; }(changeFn);
      // Mirror onto 'input' too, so typing feels live — but only for text-like
      // fields. Checkboxes/radios already fire their own 'change', and also
      // fire 'input' in modern browsers; wiring both would run a toggle
      // handler twice per click and cancel itself out.
      var textLikeTypes = { text: 1, number: 1, search: 1, email: 1, tel: 1, url: 1, password: 1, '': 1 };
      var isTextLike = realTag === 'textarea' || (realTag === 'input' && textLikeTypes[(el.getAttribute('type') || '').toLowerCase()]);
      if (typeof changeFn === 'function' && isTextLike) {
        el.oninput = el.onchange;
      }
    }
    if (hoverRaw !== null) applyHover(el, hoverRaw, scope);
    if (autoFocusRaw !== null && resolveAttrRaw(scope, autoFocusRaw) === true) {
      engine.pendingAutofocus = el;
    }

    out.push(el);
  }

  function renderChildren(engine, node, scope, out, loopPath, appendTo) {
    var target = appendTo || out;
    var isFragmentOut = !appendTo;
    var buf = [];
    var children = node.childNodes;
    for (var i = 0; i < children.length; i++) {
      renderNode(engine, children[i], scope, buf, loopPath);
    }
    for (var j = 0; j < buf.length; j++) {
      if (isFragmentOut) out.push(buf[j]);
      else appendTo.appendChild(buf[j]);
    }
  }

  function DcEngine(templateHtml, ComponentClass, props, container) {
    var t = document.createElement('template');
    t.innerHTML = templateHtml;

  loadGameData(gameId) {
    const suffix = (gameId && gameId !== 'default') ? ('-' + gameId) : '';

    const get = (base) => { try { return JSON.parse(localStorage.getItem(base + suffix)); } catch (e) { return null; } };
    let chars;
    if (isDefault) {
      const saved = get('dh-tracker-v1');
      chars = saved || [];
      const seenIds = new Set();
      chars.forEach(ch => {
        if (seenIds.has(ch.id)) {
          let newId = ch.id + '-2';
          while (seenIds.has(newId)) newId += 'x';
          ch.id = newId;
        }
        seenIds.add(ch.id);
      });
      try { localStorage.setItem('dh-tracker-v1', JSON.stringify(chars)); } catch (e) {}

  componentDidMount() {
    let games = null;
    try { games = JSON.parse(localStorage.getItem('dh-tracker-games')); } catch (e) {}
    if (!games || !games.length) games = [{ id: 'default', name: 'My Campaign' }];
    let activeGame = 'default';
    try { activeGame = localStorage.getItem('dh-tracker-active-game') || 'default'; } catch (e) {}
    if (!games.some(g => g.id === activeGame)) activeGame = 'default';
    const data = this.loadGameData(activeGame);
    const theme = this.loadThemeFor(activeGame);
    let skipAuth = false;
    try { skipAuth = localStorage.getItem('dh-tracker-skip-auth') === '1'; } catch (e) {}
    let pendingJoinId = null;
    try {
      const params = new URLSearchParams(location.search);
      pendingJoinId = params.get('join');
      if (pendingJoinId) {
        params.delete('join');
        const qs = params.toString();
        history.replaceState(null, '', location.pathname + (qs ? '?' + qs : ''));
      }
    } catch (e) {}
    this.setState({
      games, activeGame, dark: theme.dark, gameAccent: theme.gameAccent, bannerMode: theme.bannerMode,
      chars: data.chars, party: data.party, recaps: data.recaps,
      customDomains: data.customDomains, customAncestries: data.customAncestries, customClasses: data.customClasses,
      creatures: data.creatures, importedDomainCards: data.importedDomainCards, sessionElapsed: data.sessionElapsed,
      skipAuth, pendingJoinId
    });
    this._timerInterval = setInterval(() => {
      if (this.state.sessionRunning) {
        const next = this.state.sessionElapsed + 1;
        try { localStorage.setItem(this.gk('dh-tracker-session-elapsed'), String(next)); } catch (e) {}
        this.setState({ sessionElapsed: next });

    }, 1000);
    if (supabaseClient) {
      supabaseClient.auth.getSession().then(({ data }) => {
        this.applySession(data && data.session ? data.session : null);

      supabaseClient.auth.onAuthStateChange((event, session) => {
        this.applySession(session);

  componentWillUnmount() {
    if (this._timerInterval) clearInterval(this._timerInterval);

  // Called on initial session check and every auth state change (sign-in,
  // sign-out, token refresh). On a fresh sign-in, kicks off a remote fetch of
  // the active game's characters — and, if that comes back empty, offers to
  // import whatever is currently sitting in localStorage instead of silently
  // discarding it.
  applySession(session) {
    const hadSession = !!this.state.session;
    this.setState({ session, authChecked: true, authMagicLinkSent: false, authError: '' });
    if (session && !hadSession) {
      this.refreshCharsFromRemote(this.state.activeGame, { checkImport: true });
      if (this.state.pendingJoinId) {
        this.joinGame(this.state.pendingJoinId);
      } else {
        const cloudId = this.activeCloudId();
        if (cloudId) this.refreshPartyFromRemote(cloudId);

    }
  }

  refreshCharsFromRemote(gameId, opts) {

    this.loadCharsRemote(gameId).then(remoteChars => {
      if (opts.checkImport && remoteChars.length === 0) {

        if (localChars.length) {

    const email = (this.state.authEmail || '').trim();

  fmtTime(totalSeconds) {

    const sec = totalSeconds % 60;

    return h > 0 ? (h + ':' + pad(m) + ':' + pad(sec)) : (pad(m) + ':' + pad(sec));
  }

  saveAncestries(list) { try { localStorage.setItem(this.gk('dh-tracker-ancestries'), JSON.stringify(list)); } catch (e) {} }

  upAncestries(fn) {

  upImportedCards(fn) {

  // Merges the built-in domain card library with anything pasted in through
  // the bulk card importer, so both the wizard and the compendium reference
  // list see one combined set without caring where a card came from.
  effectiveDomainCardLibrary() {
    const lib = this.domainCardLibrary();
    const imported = this.state.importedDomainCards || {};
    const merged = {};
    Object.keys(lib).forEach(d => { merged[d] = lib[d].slice(); });
    Object.keys(imported).forEach(d => { merged[d] = (merged[d] || []).concat(imported[d]); });
    return merged;
  }

  // Parses the bulk card-import text format:
  //   DOMAIN: Blood
  //   CARD: Ravenous Bite
  //   TYPE: Ability
  //   LEVEL: 1
  //   TEXT: On a successful attack, mark a Stress to deal an extra 1d6 damage.
  // TYPE and LEVEL are optional (default to Ability / 1). TEXT can span
  // multiple lines — everything after it belongs to that card until the next
  // DOMAIN/CARD/TYPE/LEVEL/TEXT line. Returns { cards, errors } where errors
  // are human-readable, line-numbered strings for anything that got skipped.
  parseCardImportText(raw) {
    const lines = (raw || '').split(/\r?\n/);
    const cards = [];
    const errors = [];
    let domain = '';
    let current = null;
    let textLines = null;
    const flushText = () => {
      if (current && textLines !== null) current.text = textLines.join('\n').trim();
      textLines = null;
    };
    const flushCard = () => {
      flushText();
      if (current) {
        if (!current.domain) errors.push('Line ' + current.line + ': "' + (current.name || '(unnamed)') + '" appears before any DOMAIN: line — skipped.');
        else if (!current.name) errors.push('Line ' + current.line + ': CARD: with no name — skipped.');
        else if (!current.text) errors.push('Line ' + current.line + ': "' + current.name + '" has no TEXT — skipped.');
        else cards.push(current);
      }
      current = null;
    };
    lines.forEach((line, idx) => {
      const lineNo = idx + 1;
      const domainMatch = line.match(/^\s*DOMAIN\s*:\s*(.*)$/i);
      const cardMatch = line.match(/^\s*CARD\s*:\s*(.*)$/i);
      const typeMatch = line.match(/^\s*TYPE\s*:\s*(.*)$/i);
      const levelMatch = line.match(/^\s*LEVEL\s*:\s*(.*)$/i);
      const textMatch = line.match(/^\s*TEXT\s*:\s*(.*)$/i);
      if (domainMatch) {
        flushCard();
        domain = domainMatch[1].trim();
      } else if (cardMatch) {
        flushCard();
        current = { domain, name: cardMatch[1].trim(), type: 'Ability', level: 1, text: '', line: lineNo };
      } else if (typeMatch && current) {
        flushText();
        current.type = typeMatch[1].trim() || 'Ability';
      } else if (levelMatch && current) {
        flushText();
        const lvl = parseInt(levelMatch[1], 10);
        current.level = isNaN(lvl) ? 1 : Math.max(1, Math.min(10, lvl));
      } else if (textMatch && current) {
        textLines = [textMatch[1]];
      } else if (textLines !== null) {
        textLines.push(line);
      }
    });
    flushCard();
    return { cards, errors };
  }

  saveParty(party) { try { localStorage.setItem(this.gk('dh-tracker-party'), JSON.stringify(party)); } catch (e) {} }

  saveRecaps(recaps) { try { localStorage.setItem(this.gk('dh-tracker-recaps'), JSON.stringify(recaps)); } catch (e) {} }

    ];

  upParty(fn) {
    this.setState(s => {
      const party = JSON.parse(JSON.stringify(s.party || []));
      fn(party);
      this.saveParty(party);
      this.syncPartyRemote(party, s.party);

  defaultParty() {
    return [
      { id: 'p1', name: 'Rope, 50 ft', qty: 1, note: 'Shared climbing gear', holder: '' },
      { id: 'p2', name: 'Healing potions', qty: 3, note: 'Clear 1d4 HP', holder: '' }
    ];
  }

  // --- Shared campaigns / shared inventory (Supabase). A local game entry in
  // games[] gains an optional cloudId once it's been shared; games without one
  // stay exactly as local-only as they've always been.
  cloudIdFor(gameId) {
    const g = (this.state.games || []).find(x => x.id === gameId);
    return g && g.cloudId;
  }

  activeCloudId() { return this.cloudIdFor(this.state.activeGame); }

  loadPartyRemote(cloudId) {
    if (!supabaseClient) return Promise.resolve([]);
    return supabaseClient.from('party_items').select('id,data').eq('game_id', cloudId)
      .then(({ data, error }) => {
        if (error) { console.error('loadPartyRemote', error); return []; }
        return (data || []).map(row => Object.assign({}, row.data, { id: row.id }));
      })
      .catch(e => { console.error('loadPartyRemote', e); return []; });
  }

  savePartyItemRemote(item, cloudId) {
    if (!supabaseClient) return Promise.resolve();
    return supabaseClient.from('party_items').upsert({ id: item.id, game_id: cloudId, data: item })
      .then(({ error }) => { if (error) console.error('savePartyItemRemote', error); })
      .catch(e => console.error('savePartyItemRemote', e));
  }

  deletePartyItemRemote(id) {
    if (!supabaseClient) return Promise.resolve();
    return supabaseClient.from('party_items').delete().eq('id', id)
      .then(({ error }) => { if (error) console.error('deletePartyItemRemote', error); })
      .catch(e => console.error('deletePartyItemRemote', e));
  }

  syncPartyRemote(party, prevParty) {
    const cloudId = this.activeCloudId();
    if (!this.state.session || !cloudId) return;
    const nextIds = new Set((party || []).map(p => p.id));
    (party || []).forEach(p => this.savePartyItemRemote(p, cloudId));
    (prevParty || []).forEach(p => { if (!nextIds.has(p.id)) this.deletePartyItemRemote(p.id); });
  }

  refreshPartyFromRemote(cloudId) {
    if (!cloudId) return;
    this.loadPartyRemote(cloudId).then(party => this.setState({ party }));
  }

  // Creates the server-side campaign row + membership for the active local
  // game the first time it's shared (idempotent — a game that's already
  // shared just resolves its existing cloudId). The sharer's current local
  // party list becomes the shared list's starting state.
  ensureGameShared() {
    const existing = this.activeCloudId();
    if (existing) return Promise.resolve(existing);
    if (!supabaseClient || !this.state.session) return Promise.resolve(null);
    const activeGame = this.state.activeGame;
    const localGame = (this.state.games || []).find(g => g.id === activeGame);
    const name = (localGame && localGame.name) || 'Shared Campaign';
    this.setState({ sharingCampaign: true });
    return supabaseClient.from('games').insert({ name }).select('id').single()
      .then(({ data, error }) => {
        if (error) throw error;
        const cloudId = data.id;
        return supabaseClient.from('game_members').insert({ game_id: cloudId })
          .then(({ error: memberErr }) => { if (memberErr) throw memberErr; return cloudId; });
      })
      .then(cloudId => {
        (this.state.party || []).forEach(item => this.savePartyItemRemote(item, cloudId));
        const games = this.state.games.map(g => g.id === activeGame ? Object.assign({}, g, { cloudId }) : g);
        this.saveGames(games);
        this.setState({ games, sharingCampaign: false });
        return cloudId;
      })
      .catch(e => {
        console.error('ensureGameShared', e);
        this.setState({ sharingCampaign: false, joinError: 'Could not share this campaign — try again.' });
        return null;
      });
  }

  shareCampaign() {
    this.ensureGameShared().then(cloudId => {
      if (!cloudId) return;
      const link = location.origin + location.pathname + '?join=' + cloudId;
      try { navigator.clipboard.writeText(link); } catch (e) {}
      this.setState({ shareLinkCopied: true });
      setTimeout(() => this.setState({ shareLinkCopied: false }), 2500);
    });
  }

  // Self-service join: possession of the link (i.e. this id) is the access
  // model the group chose, so no owner-approval step — just record membership
  // and drop the player into a new local game entry pointed at it.
  joinGame(cloudId) {
    if (!supabaseClient) return;
    const existing = (this.state.games || []).find(g => g.cloudId === cloudId);
    if (existing) {
      this.setState({ pendingJoinId: null });
      if (existing.id !== this.state.activeGame) this.switchGame(existing.id);
      else this.refreshPartyFromRemote(cloudId);
      return;
    }
    // ignoreDuplicates: re-clicking a link you're already a member of (or the
    // auth listener firing more than once on load) must be a no-op, not an
    // UPDATE — there's no update policy on this table since nothing here
    // ever needs to change once a membership row exists.
    supabaseClient.from('game_members').upsert({ game_id: cloudId }, { onConflict: 'game_id,user_id', ignoreDuplicates: true })
      .then(({ error }) => {
        if (error) throw error;
        return supabaseClient.from('games').select('name').eq('id', cloudId).single();
      })
      .then(({ data, error }) => {
        if (error) throw error;
        const name = (data && data.name) || 'Shared Campaign';
        const id = 'g' + Date.now();
        const games = this.state.games.concat([{ id, name, cloudId }]);
        this.saveGames(games);
        this.setState({ games, pendingJoinId: null });
        this.switchGame(id);
      })
      .catch(e => {
        console.error('joinGame', e);
        this.setState({ pendingJoinId: null, joinError: 'That invite link is invalid or has expired.' });
      });
  }

  toggleDark() {
    const dark = !this.state.dark;
    try { localStorage.setItem(this.gk('dh-tracker-dark'), dark ? '1' : '0'); } catch (e) {}
    this.setState({ dark });
  }

  loadThemeFor(gameId) {
    const suffix = (gameId && gameId !== 'default') ? ('-' + gameId) : '';
    let dark = true;
    try { const raw = localStorage.getItem('dh-tracker-dark' + suffix); dark = raw === null ? true : raw === '1'; } catch (e) {}
    let gameAccent = null;
    try { gameAccent = localStorage.getItem('dh-tracker-accent' + suffix) || null; } catch (e) {}
    let bannerMode = 'none';
    try { bannerMode = localStorage.getItem('dh-tracker-bannermode' + suffix) || 'none'; } catch (e) {}
    return { dark, gameAccent, bannerMode };
  }

  setBannerMode(mode) {
    try { localStorage.setItem(this.gk('dh-tracker-bannermode'), mode); } catch (e) {}
    this.setState({ bannerMode: mode });
  }

  setGameAccent(hex) {
    try { localStorage.setItem(this.gk('dh-tracker-accent'), hex); } catch (e) {}
    this.setState({ gameAccent: hex });
  }

  save(chars) { try { localStorage.setItem(this.gk('dh-tracker-v1'), JSON.stringify(chars)); } catch (e) {} }

  // --- Remote (Supabase) character persistence — only used while signed in.
  // localStorage stays the source of truth when signed out, so the app keeps
  // working offline/unauthenticated exactly as it always has.
  loadCharsRemote(gameId) {
    if (!supabaseClient) return Promise.resolve([]);
    return supabaseClient.from('characters').select('id,data').eq('game_id', gameId)
      .then(({ data, error }) => {
        if (error) { console.error('loadCharsRemote', error); return []; }
        return (data || []).map(row => Object.assign({}, row.data, { id: row.id }));
      })
      .catch(e => { console.error('loadCharsRemote', e); return []; });
  }

  saveCharRemote(char, gameId) {
    if (!supabaseClient) return Promise.resolve();
    return supabaseClient.from('characters').upsert({ id: char.id, game_id: gameId, data: char })
      .then(({ error }) => { if (error) console.error('saveCharRemote', error); })
      .catch(e => console.error('saveCharRemote', e));
  }

  deleteCharRemote(id) {
    if (!supabaseClient) return Promise.resolve();
    return supabaseClient.from('characters').delete().eq('id', id)
      .then(({ error }) => { if (error) console.error('deleteCharRemote', error); })
      .catch(e => console.error('deleteCharRemote', e));
  }

  // Mirrors a just-saved local chars[] array to Supabase, best-effort. Upserts
  // everything currently present (cheap at this scale — mirrors the existing
  // "write the whole array" behavior of save()) and deletes any id that
  // dropped out of the array since the previous state.
  syncCharsRemote(chars, prevChars) {
    if (!this.state.session) return;
    const gameId = this.state.activeGame;
    const nextIds = new Set((chars || []).map(c => c.id));
    (chars || []).forEach(c => this.saveCharRemote(c, gameId));
    (prevChars || []).forEach(c => { if (!nextIds.has(c.id)) this.deleteCharRemote(c.id); });
  }

  up(fn) {
    this.setState(s => {
      const chars = JSON.parse(JSON.stringify(s.chars));
      const c = chars.find(x => x.id === s.activeId);
      if (c) fn(c, chars);
      this.save(chars);
      this.syncCharsRemote(chars, s.chars);
      return { chars };
    });
  }

  upAll(fn) {
    this.setState(s => {
      const chars = JSON.parse(JSON.stringify(s.chars));
      fn(chars);
      this.save(chars);
      this.syncCharsRemote(chars, s.chars);
      return { chars };
    });
  }

  showUndo(kind, label, data) {
    if (this.undoTimer) clearTimeout(this.undoTimer);
    this.setState({ undo: { kind, label, data } });
    this.undoTimer = setTimeout(() => this.setState({ undo: null }), 8000);
  }

  performUndo() {
    const u = this.state.undo;
    if (!u) return;
    if (this.undoTimer) clearTimeout(this.undoTimer);
    if (u.kind === 'char' && u.data.char) {
      this.upAll(chars => {
        const idx = Math.min(u.data.index, chars.length);
        chars.splice(idx, 0, u.data.char);
      });
    } else if (u.kind === 'comp' && u.data.comp) {
      this.upAll(chars => {
        const owner = chars.find(x => x.id === u.data.ownerId);
        if (owner) {
          if (!owner.companions) owner.companions = [];
          const idx = Math.min(u.data.index, owner.companions.length);
          owner.companions.splice(idx, 0, u.data.comp);
        }
      });
    }
    this.setState({ undo: null });
  }

  active() { return (this.state.chars || []).find(x => x.id === this.state.activeId) || null; }

  mkPips(max, marked, onColor, set) {
    const arr = [];
    for (let i = 0; i < max; i++) {
      arr.push({
        bg: i < marked ? onColor : 'transparent',
        click: () => set((i + 1 === marked) ? i : i + 1)
      });
    }
    return arr;
  }

  // HP/Stress table rule: pips start full (all lit) and count down — the
  // leftmost pips go dark first as damage/stress is marked, instead of
  // filling up from empty. Click targeting stays the same as mkPips.
  mkPipsCountdown(max, marked, onColor, set) {
    const arr = [];
    for (let i = 0; i < max; i++) {
      arr.push({
        bg: i < marked ? 'transparent' : onColor,
        click: () => set((i + 1 === marked) ? i : i + 1)
      });
    }
    return arr;
  }

  mkPipsReadonlyCountdown(max, marked, onColor) {
    const arr = [];
    for (let i = 0; i < max; i++) arr.push({ bg: i < marked ? 'transparent' : onColor });
    return arr;
  }

  mkPipsReadonly(max, marked, onColor) {
    const arr = [];
    for (let i = 0; i < max; i++) arr.push({ bg: i < marked ? onColor : 'transparent' });
    return arr;
  }

  domainColor(d) {
    const builtin = { Arcana: '#6B4FA0', Blade: '#A33B3B', Bone: '#7A7468', Codex: '#3B6EA3', Grace: '#B05580', Midnight: '#3A3550', Sage: '#4E7A4E', Splendor: '#B08A2E', Valor: '#B0622E', Blood: '#7A1F2B', Dread: '#241B2F' };
    if (builtin[d]) return builtin[d];
    const custom = (this.state.customDomains || []).find(x => x.name === d);
    return custom ? custom.color : '#7A7468';
  }

  // Generic bind for an item inside an arbitrary state array (not the active
  // character) — upFn is the list's upXxx(fn) updater, list/i locate the item,
  // path is a dotted field path within that item.
  bindItem(upFn, list, i, path, isNum) {
    let val = list[i];
    for (const k of path.split('.')) val = val ? val[k] : '';
    return {
      val: val === undefined || val === null ? '' : val,
      on: (e) => {
        const raw = e.target.value;
        const v = isNum ? (parseInt(raw, 10) || 0) : raw;
        upFn(arr => {
          const keys = path.split('.');
          let o = arr[i];
          for (let j = 0; j < keys.length - 1; j++) o = o[keys[j]];
          o[keys[keys.length - 1]] = v;
        });
      }
    };
  }

  bind(path, isNum) {
    const c = this.active();
    let val = c;
    for (const k of path.split('.')) val = val ? val[k] : '';
    return {
      val: val === undefined || val === null ? '' : val,
      on: (e) => {
        const raw = e.target.value;
        const v = isNum ? (parseInt(raw, 10) || 0) : raw;
        this.up(ch => {
          const keys = path.split('.');
          let o = ch;
          for (let i = 0; i < keys.length - 1; i++) o = o[keys[i]];
          o[keys[keys.length - 1]] = v;
        });
      }
    };
  }

  tier(level) {
    if (level <= 1) return 'Tier 1';
    if (level <= 4) return 'Tier 2';
    if (level <= 7) return 'Tier 3';
    return 'Tier 4';
  }

  creatureToCompanion(cr) {
    this.normalizeCreature(cr);
    return {
      name: cr.name, level: 1, difficulty: cr.difficulty || 12, movement: '',
      hp: { label: cr.type || 'Moderate', max: (cr.hp && cr.hp.max) || 5, marked: 0 },
      stress: { max: (cr.stress && cr.stress.max) || 3, marked: 0 },
      attacks: cr.attacks.map(a => ({ name: a.name, range: a.range, formula: a.formula, effect: a.effect })),
      features: cr.features.map(f => ({ type: 'Passive', name: f.name, desc: f.desc })),
      notes: cr.description || ''
    };
  }

  // Lazily upgrades a companion saved under the old schema (species/evasion/
  // single attack+damage/training list) to the current stat-block shape, and
  // fills in any field a hand-built companion is missing.
  normalizeCompanion(comp) {
    if (!comp.portraitKey) comp.portraitKey = 'comp-' + Math.random().toString(36).slice(2, 9);
    if (comp.level == null) comp.level = 1;
    if (comp.difficulty == null) comp.difficulty = 12;
    if (comp.movement == null) comp.movement = '';
    if (comp.notes == null) comp.notes = typeof comp.features === 'string' ? comp.features : '';
    if (!comp.hp) comp.hp = { label: 'Moderate', max: 5, marked: 0 };
    if (comp.hp.label == null) comp.hp.label = 'Moderate';
    if (!comp.stress) comp.stress = { max: 3, marked: 0 };
    if (!Array.isArray(comp.attacks)) {
      comp.attacks = comp.attack ? [{ name: comp.attack, range: 'Melee', formula: comp.damage || '', effect: '' }] : [];
    } else if (comp.attacks.length === 1 && comp.attacks[0].name === 'Attack' && comp.attack && comp.attack !== 'Attack') {
      // repair a companion migrated by an earlier buggy version that dropped the attack name
      comp.attacks[0].name = comp.attack;
    }
    if (!Array.isArray(comp.features)) {
      comp.features = (Array.isArray(comp.training) ? comp.training : []).filter(t => t.taken).map(t => ({ type: 'Passive', name: t.name, desc: t.desc }));
    }
  }

  // Builds the editable rows for one of a character's weapon lists
  // ('weaponsPrimary' or 'weaponsSecondary'), each with an equipped toggle
  // and its own features sublist.
  buildWeaponList(listKey) {
    const c = this.active();
    if (!c) return [];
    const list = c[listKey] || [];
    return list.map((w, i) => ({
      equipped: { val: !!w.equipped, on: () => this.up(ch => { ch[listKey][i].equipped = !ch[listKey][i].equipped; }) },
      name: { val: w.name, on: e => this.up(ch => { ch[listKey][i].name = e.target.value; }) },
      range: { val: w.range, on: e => this.up(ch => { ch[listKey][i].range = e.target.value; }) },
      damage: { val: w.damage, on: e => this.up(ch => { ch[listKey][i].damage = e.target.value; }) },
      remove: () => this.up(ch => ch[listKey].splice(i, 1)),
      features: (w.features || []).map((f, j) => ({
        name: { val: f.name, on: e => this.up(ch => { ch[listKey][i].features[j].name = e.target.value; }) },
        desc: { val: f.desc, on: e => this.up(ch => { ch[listKey][i].features[j].desc = e.target.value; }) },
        remove: () => this.up(ch => ch[listKey][i].features.splice(j, 1))
      })),
      addFeature: () => this.up(ch => ch[listKey][i].features.push({ name: '', desc: '' }))
    }));
  }

  rollTraitArray() {
    const order = ['Agility', 'Strength', 'Finesse', 'Instinct', 'Presence', 'Knowledge'];
    const pool = [2, 1, 1, 0, 0, -1];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = pool[i]; pool[i] = pool[j]; pool[j] = t;
    }
    const traits = {};
    order.forEach((k, i) => { traits[k] = pool[i]; });
    return traits;
  }

  levelScaling(level) {
    const proficiency = 1 + (level >= 2 ? 1 : 0) + (level >= 5 ? 1 : 0) + (level >= 8 ? 1 : 0);
    const hpBonus = Math.floor((level - 1) / 2);
    const domainCardCount = level + 1; // 2 at level 1, +1 per level thereafter
    return {
      proficiency,
      hpBonus,
      domainCardCount,
      thresholds: { major: 7 + (level - 1), severe: 12 + (level - 1) }
    };
  }

  finishWizard() {
    const w = this.state.wizard;
    if (!w) return;
    const cd = this.classData()[w.klass] || { domains: [], evasion: 10, hp: 6 };
    const base = this.blankChar();
    const level = Math.max(1, Math.min(10, parseInt(w.level, 10) || 1));
    const scale = this.levelScaling(level);
    const backstory = [w.background.trim(), w.connections.trim() && ('Connections: ' + w.connections.trim())].filter(Boolean).join('\n\n');
    const cards = w.domainCards.filter(c => c.name.trim()).map((c, i) => ({
      id: 'k' + (i + 1), name: c.name.trim(), domain: cd.domains[i] || cd.domains[0] || '', level: 1, type: 'Ability', text: c.text.trim(), loadout: true
    }));
    // for a level > 1 character, pad with additional domain cards from the library up to the level's total — the player can swap these via the Cards tab
    const lib = this.effectiveDomainCardLibrary();
    const usedNames = new Set(cards.map(c => c.name));
    for (let i = cards.length; i < scale.domainCardCount; i++) {
      const domain = cd.domains[i % cd.domains.length] || cd.domains[0] || '';
      const options = (lib[domain] || []).filter(o => !usedNames.has(o.name));
      const pick = options[0];
      if (pick) usedNames.add(pick.name);
      cards.push({
        id: 'k' + (i + 1), name: pick ? pick.name : 'Domain card (choose)', domain,
        level: Math.min(level, i + 1), type: pick ? pick.type : 'Ability', text: pick ? pick.text : '', loadout: cards.length < 5
      });
    }
    const experiences = [w.exp1, w.exp2].filter(x => x && x.trim()).map(x => ({ name: x.trim(), bonus: 2 }));
    const companions = [];
    if (w.companionEnabled && w.compName.trim()) {
      const comp = this.defaultCompanion();
      comp.name = w.compName.trim();
      comp.movement = w.compMovement.trim();
      comp.portraitKey = w.compPortraitKey;
      comp.backstory = w.compBackstory.trim();
      if (w.compAttackName.trim() || w.compAttackFormula.trim()) {
        comp.attacks = [{ name: w.compAttackName.trim() || 'Attack', range: w.compAttackRange, formula: w.compAttackFormula.trim(), effect: '' }];
      }
      companions.push(comp);
    }
    const char = Object.assign({}, base, {
      id: w.id,
      name: w.name.trim() || 'New Adventurer',
      pronouns: w.pronouns, ancestry: w.ancestry, community: w.community,
      klass: w.klass, subclass: w.subclass, domains: cd.domains.slice(),
      multiclass: (w.multiclassEnabled && w.multiKlass) ? { klass: w.multiKlass, subclass: w.multiSubclass } : null,
      level, proficiency: scale.proficiency,
      evasion: cd.evasion, traits: w.traits,
      hp: { max: cd.hp + scale.hpBonus, marked: 0 }, stress: { max: 6, marked: 0 }, hope: { max: 6, marked: 2 },
      armor: { max: w.armorScore, marked: 0 }, thresholds: scale.thresholds,
      cards, experiences, backstory, inventory: w.inventoryText,
      weapons: { primary: { name: w.weaponName, range: w.weaponRange, damage: w.weaponDamage }, secondaryEnabled: false, secondary: { name: '', range: 'Melee', damage: '' } },
      equippedArmor: { name: w.armorName, score: w.armorScore }, armorScore: w.armorScore,
      companions, activeCompanion: 0
    });
    this.upAll(chars => chars.push(char));
    this.setState({ wizard: null, screen: 'sheet', activeId: char.id, tab: 'play', dmgInput: '', useArmor: false });
  }

  // Fills in any fields missing from an older/partial character object with
  // current defaults, mutating in place. This is the app's schema migration
  // path — previously inlined in renderVals() (runs lazily on every render),
  // also reused by JSON import so an imported file gets the same treatment
  // as an old localStorage save that's a few versions behind.
  normalizeChar(c) {
    if (!c.downtime) c.downtime = { moves: this.defaultDowntimeMoves(), project: { name: '', progress: 0, max: 6 } };
    if (!c.conditions) c.conditions = this.defaultConditions();
    if (!c.shortRest) c.shortRest = { moves: this.defaultShortRestMoves() };
    if (!c.weapons) c.weapons = this.defaultWeapons();
    if (!c.weaponsPrimary) {
      c.weaponsPrimary = (c.weapons.primary && c.weapons.primary.name)
        ? [{ name: c.weapons.primary.name, range: c.weapons.primary.range || 'Melee', damage: c.weapons.primary.damage || '', equipped: true, features: [] }]
        : [];
    }
    if (!c.weaponsSecondary) {
      c.weaponsSecondary = (c.weapons.secondaryEnabled && c.weapons.secondary && c.weapons.secondary.name)
        ? [{ name: c.weapons.secondary.name, range: c.weapons.secondary.range || 'Melee', damage: c.weapons.secondary.damage || '', equipped: true, features: [] }]
        : [];
    }
    if (!c.equippedArmor) c.equippedArmor = { name: '', score: c.armorScore || 3 };
    if (!c.companions) { c.companions = c.companion ? [c.companion] : []; c.activeCompanion = 0; }
    if (c.activeCompanion == null) c.activeCompanion = 0;
    if (c.activeCompanion >= c.companions.length) c.activeCompanion = Math.max(0, c.companions.length - 1);
    if (!c.wildshape) c.wildshape = this.defaultWildshape();
    if (!c.transformation) c.transformation = this.defaultTransformation();
    if (!c.dmgMods) c.dmgMods = [];
    if (!c.trackers) c.trackers = [];
    if (!c.restItems) c.restItems = [];
    if (!c.cards) c.cards = [];
    if (!c.experiences) c.experiences = [];
    if (!c.gold) c.gold = { Handfuls: 0, Bags: 0, Chests: 0 };
    if (!c.adv) c.adv = {};
    if (!c.levelLog) c.levelLog = [];
    if (typeof c.inventory !== 'string') c.inventory = '';
    if (typeof c.notes !== 'string') c.notes = '';
    return c;
  }

  // Strips characters that would be awkward/unsafe in a downloaded filename,
  // collapsing whitespace to nothing rather than swapping in underscores.
  sanitizeFilename(str) {
    return (str || '').replace(/[^a-zA-Z0-9_-]+/g, '');
  }

  downloadJson(filename, dataObj) {
    const blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  exportCharacterJson() {
    const c = this.active();
    if (!c) return;
    const charName = this.sanitizeFilename(c.name) || 'character';
    const campaign = ((this.state.games || []).find(g => g.id === this.state.activeGame) || { name: 'campaign' }).name;
    const campaignName = this.sanitizeFilename(campaign) || 'campaign';
    const payload = Object.assign({}, JSON.parse(JSON.stringify(c)), { schemaVersion: (typeof APP_VERSION !== 'undefined' ? APP_VERSION : '') });
    this.downloadJson(charName + '-' + campaignName + '.json', payload);
  }

  // Required for a file to be treated as a character at all — deliberately
  // small; normalizeChar() backfills everything else. 'class'/'stats' in the
  // feature spec map to this schema's klass/traits fields.
  importRequiredKeys() {
    return ['name', 'klass', 'traits', 'hp', 'inventory'];
  }

  handleImportedFile(rawText) {
    let raw;
    try {
      raw = JSON.parse(rawText);
    } catch (e) {
      this.setState({ importError: 'That file isn’t valid JSON — nothing was imported.' });
      return;
    }
    if (!raw || typeof raw !== 'object' || Array.isArray(raw)) {
      this.setState({ importError: 'That file doesn’t look like a character export — nothing was imported.' });
      return;
    }
    const missing = this.importRequiredKeys().filter(k => !(k in raw));
    if (missing.length) {
      this.setState({ importError: 'That file is missing required character data (' + missing.join(', ') + ') — nothing was imported.' });
      return;
    }

    // Snapshot which top-level keys the import actually specified BEFORE
    // migration fills in defaults for anything missing — otherwise every
    // field would look "present" post-migration and the merge path below
    // couldn't tell a real value apart from a backfilled default.
    const rawKeys = Object.keys(raw).filter(k => k !== 'schemaVersion');
    const migrated = JSON.parse(JSON.stringify(raw));
    delete migrated.schemaVersion;
    this.normalizeChar(migrated);

    const chars = this.state.chars || [];
    const norm = n => (n || '').trim().toLowerCase();
    const dup = (migrated.id && chars.find(ch => ch.id === migrated.id))
      || chars.find(ch => norm(ch.name) === norm(migrated.name));

    if (!dup) {
      if (!migrated.id || chars.some(ch => ch.id === migrated.id)) migrated.id = 'c' + Date.now();
      this.upAll(list => list.push(migrated));
      return;
    }
    this.setState({ importConflict: { migrated, rawKeys, existingId: dup.id } });
  }

  importAsNewChar(migrated, rawKeys, chars) {
    const nc = JSON.parse(JSON.stringify(migrated));
    nc.id = 'c' + Date.now();
    const baseName = nc.name || 'Imported character';
    const norm = n => (n || '').trim().toLowerCase();
    let n = 2;
    nc.name = baseName;
    while (chars.some(ch => norm(ch.name) === norm(nc.name))) {
      nc.name = baseName + ' (' + n + ')';
      n++;
    }
    return nc;
  }

  mergeChar(existing, migrated, rawKeys) {
    const merged = JSON.parse(JSON.stringify(existing));
    rawKeys.forEach(k => {
      if (k === 'id') return; // never change the existing character's id on merge
      merged[k] = migrated[k];
    });
    return merged;
  }

  computeMergeDiff(existing, migrated, rawKeys) {
    const lines = [];
    const eq = (a, b) => JSON.stringify(a) === JSON.stringify(b);
    const label = k => ({ klass: 'Class', hp: 'HP', armorScore: 'Armor Score' }[k]) || (k.charAt(0).toUpperCase() + k.slice(1));
    const pipDiff = (name, oldV, newV, keys) => {
      const parts = keys.filter(k => oldV[k] !== newV[k]).map(k => k + ' ' + oldV[k] + '→' + newV[k]);
      if (parts.length) lines.push(name + ': ' + parts.join(', '));
    };
    rawKeys.forEach(k => {
      if (k === 'id') return;
      const oldV = existing[k], newV = migrated[k];
      if (eq(oldV, newV)) return;
      if ((k === 'hp' || k === 'stress' || k === 'hope' || k === 'armor') && oldV && newV) {
        pipDiff(label(k), oldV, newV, ['max', 'marked']);
      } else if (k === 'thresholds' && oldV && newV) {
        pipDiff('Thresholds', oldV, newV, ['major', 'severe']);
      } else if (k === 'traits' && oldV && newV) {
        pipDiff('Traits', oldV, newV, Object.keys(newV));
      } else if (k === 'gold' && oldV && newV) {
        pipDiff('Gold', oldV, newV, Object.keys(newV));
      } else if (Array.isArray(oldV) && Array.isArray(newV)) {
        const delta = newV.length - oldV.length;
        lines.push(label(k) + ': ' + oldV.length + ' → ' + newV.length + ' item(s)' + (delta ? ' (' + (delta > 0 ? '+' : '') + delta + ')' : ''));
      } else if (typeof oldV !== 'object' && typeof newV !== 'object') {
        lines.push(label(k) + ': ' + oldV + ' → ' + newV);
      } else {
        lines.push(label(k) + ' changed');
      }
    });
    return lines;
  }

  dmgCalc(c) {
    const base = parseInt(this.state.dmgInput, 10);
    if (!c || isNaN(base)) return { txt: 'Enter incoming damage to preview the result.', hp: 0, valid: false };
    let d = base;
    for (const m of c.dmgMods) {
      if (!m.active) continue;
      if (m.type === 'half') d = Math.floor(d / 2);
      if (m.type === 'minus') d -= m.value;
      if (m.type === 'plus') d += m.value;
    }
    d = Math.max(0, d);
    let hp = 0, band = 'None';
    if (d >= c.thresholds.severe) { hp = 3; band = 'Severe'; }
    else if (d >= c.thresholds.major) { hp = 2; band = 'Major'; }
    else if (d >= 1) { hp = 1; band = 'Minor'; }
    let armorNote = '';
    if (this.state.useArmor && hp > 0 && c.armor.marked < c.armor.max) { hp -= 1; armorNote = ' (armor slot marked)'; }
    const txt = hp === 0 && band === 'None' ? 'Final damage 0 — no Hit Points marked.'
      : 'Final damage ' + d + ' → ' + band + ': mark ' + hp + ' HP' + armorNote + '.';
    return { txt, hp, valid: true };
  }
